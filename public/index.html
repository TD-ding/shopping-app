<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p>加载中...</p>
  </div>

  <div class="top-notice" id="top-notice">
    <span id="top-notice-text"></span>
  </div>

  <header>
    <div class="header-inner">
      <h1 class="logo">Mini Shop</h1>
      <nav>
        <button class="nav-btn active" data-page="products">商品</button>
        <button class="nav-btn" data-page="cart">购物车 <span id="cart-count" class="badge">0</span></button>
        <button class="nav-btn" data-page="orders">订单</button>
      </nav>
    </div>
  </header>

  <main id="page-products" class="page active">
    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="搜索商品...">
        <button class="search-clear hidden" id="search-clear" title="清除">&times;</button>
      </div>
      <div class="toolbar-row">
        <div class="category-bar" id="category-bar">
          <button class="fav-filter-btn" id="fav-filter-btn">❤️ 仅看收藏</button>
        </div>
        <div class="sort-bar">
          <button class="sort-btn active" data-sort="default">默认</button>
          <button class="sort-btn" data-sort="asc">价格 ↑</button>
          <button class="sort-btn" data-sort="desc">价格 ↓</button>
        </div>
      </div>
    </div>
    <div class="product-grid" id="product-grid"></div>
  </main>

  <main id="page-cart" class="page">
    <div id="cart-content"></div>
  </main>

  <main id="page-orders" class="page">
    <div id="orders-content"></div>
  </main>

  <div class="modal-overlay" id="detail-modal">
    <div class="modal detail-modal">
      <div class="modal-header">
        <h2 id="detail-title"></h2>
        <button class="modal-close" id="detail-close">&times;</button>
      </div>
      <div class="detail-body">
        <img id="detail-img" class="detail-img" src="" alt="">
        <div class="detail-category" id="detail-category"></div>
        <p class="detail-desc" id="detail-desc"></p>
        <div class="detail-footer">
          <span class="price" id="detail-price"></span>
          <button class="btn-primary" id="detail-add-cart">加入购物车</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="checkout-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>确认下单</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="checkout-form">
        <div class="form-group">
          <label>收货人姓名</label>
          <input type="text" id="order-name" required placeholder="请输入姓名">
        </div>
        <div class="form-group">
          <label>手机号码</label>
          <input type="tel" id="order-phone" required placeholder="请输入11位手机号" pattern="^1[3-9]\d{9}$">
          <span class="form-hint" id="phone-hint"></span>
        </div>
        <div class="form-group">
          <label>收货地址</label>
          <textarea id="order-address" required placeholder="请输入详细地址"></textarea>
        </div>
        <div class="order-summary" id="order-summary"></div>
        <button type="submit" class="btn-primary btn-checkout" id="btn-submit-order">提交订单</button>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
